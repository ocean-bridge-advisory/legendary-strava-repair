<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIT Gap Repair</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:        #0d0f12;
    --surface:   #151920;
    --border:    #252c38;
    --accent:    #00d4ff;
    --accent-dim:#00d4ff22;
    --warn:      #ff9b3e;
    --ok:        #3effa0;
    --text:      #c8d4e0;
    --muted:     #5a6a7a;
    --gap-bg:    #1a1200;
    --gap-border:#3d2a00;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { width: 18px; height: 18px; }

  header h1 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.02em;
  }
  header span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-left: 2px;
  }

  main { max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }

  #drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    padding: 56px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  #drop-zone:hover, #drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  #drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  #drop-zone .icon { font-size: 36px; display: block; margin-bottom: 12px; }
  #drop-zone p { color: var(--muted); font-size: 13px; margin-top: 6px; }
  #drop-zone strong { color: var(--text); }

  #status {
    display: none;
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 14px;
    border-radius: 6px;
    margin-top: 16px;
    border-left: 3px solid var(--muted);
  }
  #status.loading { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  #status.error   { border-color: #ff4e6a; color: #ff4e6a; background: #ff4e6a18; }
  #status.ok      { border-color: var(--ok); color: var(--ok); background: #3effa018; }

  #summary { display: none; margin-top: 28px; padding: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .summary-row { display: flex; gap: 32px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-family: var(--mono); font-size: 22px; font-weight: 600; color: #fff; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

  #gaps-section { display: none; margin-top: 32px; }
  #gaps-section h2 { font-family: var(--mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--warn); margin-bottom: 16px; }

  .gap-card { background: var(--gap-bg); border: 1px solid var(--gap-border); border-radius: 10px; padding: 20px; margin-bottom: 14px; }
  .gap-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .gap-title { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--warn); }
  .badge { font-family: var(--mono); font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #1e1600; border: 1px solid var(--gap-border); color: var(--text); }

  .gap-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 18px; }
  .gap-stat-val { font-family: var(--mono); font-size: 18px; font-weight: 500; color: #fff; }
  .gap-stat-label { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .gap-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  label { display: flex; flex-direction: column; gap: 5px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  input[type="number"] {
    background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
    color: #fff; font-family: var(--mono); font-size: 15px; padding: 8px 10px; width: 100%;
    outline: none; transition: border-color 0.15s; -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus { border-color: var(--accent); }

  .gap-estimate { margin-top: 12px; font-family: var(--mono); font-size: 11px; color: var(--muted); padding: 8px 10px; background: var(--bg); border-radius: 4px; border-left: 2px solid var(--accent); }
  .gap-estimate strong { color: var(--accent); }

  #repair-section { display: none; margin-top: 28px; }
  #btn-repair {
    width: 100%; padding: 14px; background: var(--accent); color: #000;
    font-family: var(--mono); font-size: 14px; font-weight: 600; border: none;
    border-radius: 7px; cursor: pointer; letter-spacing: 0.04em;
    transition: opacity 0.15s, transform 0.1s;
  }
  #btn-repair:hover { opacity: 0.88; }
  #btn-repair:active { transform: scale(0.99); }
  #btn-repair:disabled { opacity: 0.4; cursor: not-allowed; }

  #result-section { display: none; margin-top: 28px; }
  .result-box { background: #001a0e; border: 1px solid #00532e; border-radius: 10px; padding: 20px; }
  .result-box h3 { font-family: var(--mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ok); margin-bottom: 16px; }
  .result-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }

  #btn-download {
    display: block; width: 100%; padding: 13px; background: transparent; color: var(--ok);
    font-family: var(--mono); font-size: 13px; font-weight: 600; border: 1.5px solid var(--ok);
    border-radius: 7px; cursor: pointer; text-align: center; text-decoration: none;
    letter-spacing: 0.04em; transition: background 0.15s;
  }
  #btn-download:hover { background: #3effa015; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid currentColor; border-top-color: transparent;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    margin-right: 7px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 500px) {
    .gap-stats { grid-template-columns: 1fr 1fr; }
    .gap-inputs { grid-template-columns: 1fr; }
    .result-stats { grid-template-columns: 1fr 1fr; }
    .summary-row { gap: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 9 Q5 3 9 9 Q13 15 16 9" stroke="#000" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    </svg>
  </div>
  <h1>FIT Gap Repair <span>for Garmin cycling files</span></h1>
</header>

<main>
  <div id="drop-zone">
    <input type="file" id="file-input" accept=".fit">
    <span class="icon">📁</span>
    <strong>Drop a .fit file here</strong>
    <p>or click to browse — Garmin cycling activities only</p>
  </div>

  <div id="status"></div>

  <div id="summary">
    <div class="summary-row">
      <div class="stat"><span class="stat-val" id="s-records">—</span><span class="stat-label">Records</span></div>
      <div class="stat"><span class="stat-val" id="s-laps">—</span><span class="stat-label">Laps</span></div>
      <div class="stat"><span class="stat-val" id="s-dist">—</span><span class="stat-label">Recorded km</span></div>
      <div class="stat"><span class="stat-val" id="s-gaps">—</span><span class="stat-label">Gaps found</span></div>
    </div>
  </div>

  <div id="gaps-section">
    <h2 id="gaps-heading">Gaps detected</h2>
    <div id="gaps-container"></div>
  </div>

  <div id="repair-section">
    <hr class="divider">
    <button id="btn-repair">Repair FIT file</button>
  </div>

  <div id="result-section">
    <div class="result-box">
      <h3>✓ File repaired</h3>
      <div class="result-stats">
        <div class="stat"><span class="stat-val" id="r-orig">—</span><span class="stat-label">Original km</span></div>
        <div class="stat"><span class="stat-val" id="r-added">—</span><span class="stat-label">Added km</span></div>
        <div class="stat"><span class="stat-val" id="r-total">—</span><span class="stat-label">Corrected total</span></div>
      </div>
      <a id="btn-download" href="#">⬇ Download repaired .fit</a>
    </div>
  </div>
</main>

<script>
  const API = 'https://legendary-strava-repair.onrender.com';
  const POLL_MS = 2000;

  let currentFile = null;
  let analysisData = null;

  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const statusEl    = document.getElementById('status');
  const summaryEl   = document.getElementById('summary');
  const gapsSection = document.getElementById('gaps-section');
  const gapsCont    = document.getElementById('gaps-container');
  const repairSect  = document.getElementById('repair-section');
  const btnRepair   = document.getElementById('btn-repair');
  const resultSect  = document.getElementById('result-section');
  const btnDownload = document.getElementById('btn-download');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f) handleFile(f); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

  function setStatus(msg, type = 'loading') {
    statusEl.style.display = 'block';
    statusEl.className = type;
    statusEl.innerHTML = type === 'loading' ? `<span class="spinner"></span>${msg}` : msg;
  }
  function clearStatus() { statusEl.style.display = 'none'; }

  function resetUI() {
    summaryEl.style.display = 'none';
    gapsSection.style.display = 'none';
    repairSect.style.display = 'none';
    resultSect.style.display = 'none';
    gapsCont.innerHTML = '';
    analysisData = null;
  }

  // ── Poll until job is done ────────────────────────────────────────────────
  function pollJob(jobId, onDone, onError) {
    const interval = setInterval(async () => {
      try {
        const res = await fetch(`${API}/status/${jobId}`);
        const data = await res.json();
        if (data.status === 'running') return; // keep polling
        clearInterval(interval);
        if (data.status === 'error') {
          onError(data.error || 'Server error');
        } else {
          onDone(data);
        }
      } catch (err) {
        clearInterval(interval);
        onError(err.message);
      }
    }, POLL_MS);
  }

  // ── Handle file upload ────────────────────────────────────────────────────
  async function handleFile(file) {
    if (!file.name.toLowerCase().endsWith('.fit')) {
      setStatus('Only .fit files are supported.', 'error'); return;
    }
    currentFile = file;
    resetUI();
    setStatus(`Uploading ${file.name}…`);

    const fd = new FormData();
    fd.append('file', file);

    let jobId;
    try {
      const res = await fetch(`${API}/analyze`, { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      jobId = data.job_id;
    } catch (err) {
      setStatus(`Upload failed: ${err.message}`, 'error'); return;
    }

    setStatus('Analysing file… this may take up to 30 seconds on first run');

    pollJob(jobId,
      (data) => {
        analysisData = data;
        document.getElementById('s-records').textContent = data.num_records.toLocaleString();
        document.getElementById('s-laps').textContent    = data.num_laps;
        document.getElementById('s-dist').textContent    = data.original_dist_km.toFixed(2);
        document.getElementById('s-gaps').textContent    = data.gaps.length;
        summaryEl.style.display = 'block';

        if (data.gaps.length === 0) {
          setStatus('No gaps detected — timestamp jumps &gt; 30 s with GPS displacement &gt; 50 m.', 'ok');
          return;
        }
        clearStatus();
        renderGaps(data.gaps);
      },
      (err) => setStatus(`Analysis failed: ${err}`, 'error')
    );
  }

  // ── Render gap cards ──────────────────────────────────────────────────────
  function renderGaps(gaps) {
    document.getElementById('gaps-heading').textContent =
      `${gaps.length} gap${gaps.length > 1 ? 's' : ''} detected`;

    gaps.forEach((g, i) => {
      const card = document.createElement('div');
      card.className = 'gap-card';
      card.dataset.idx = i;

      const timeMins = (g.time_gap_s / 60).toFixed(1);
      const gpsM     = Math.round(g.gps_gap_m);
      const distKm   = g.dist_before_km.toFixed(2);
      const defSpd   = g.default_speed_kmh.toFixed(1);

      card.innerHTML = `
        <div class="gap-header">
          <span class="gap-title">Gap ${i + 1}</span>
          <span class="badge">at ${distKm} km</span>
        </div>
        <div class="gap-stats">
          <div><div class="gap-stat-val">${timeMins} min</div><div class="gap-stat-label">Time jump</div></div>
          <div><div class="gap-stat-val">${gpsM} m</div><div class="gap-stat-label">GPS jump (straight)</div></div>
          <div><div class="gap-stat-val">${distKm} km</div><div class="gap-stat-label">Position in ride</div></div>
        </div>
        <div class="gap-inputs">
          <label>Stopped time (min)
            <input type="number" class="inp-stop" data-idx="${i}"
              min="0" max="${(g.time_gap_s / 60).toFixed(1)}" step="0.5" value="0">
          </label>
          <label>Speed during gap (km/h)
            <input type="number" class="inp-speed" data-idx="${i}"
              min="1" max="80" step="0.5" value="${defSpd}"
              title="Default = average of surrounding records (${defSpd} km/h)">
          </label>
        </div>
        <div class="gap-estimate" id="est-${i}"></div>
      `;

      gapsCont.appendChild(card);

      const stopInp  = card.querySelector('.inp-stop');
      const speedInp = card.querySelector('.inp-speed');
      const updateEst = () => updateEstimate(i, g.time_gap_s, stopInp, speedInp);
      stopInp.addEventListener('input', updateEst);
      speedInp.addEventListener('input', updateEst);
      updateEst();
    });

    gapsSection.style.display = 'block';
    repairSect.style.display  = 'block';
  }

  function updateEstimate(i, time_gap_s, stopInp, speedInp) {
    const stopS    = parseFloat(stopInp.value || 0) * 60;
    const speedKmh = parseFloat(speedInp.value || 25);
    const rideS    = Math.max(0, time_gap_s - stopS);
    const distKm   = (rideS * speedKmh / 3600).toFixed(2);
    const rideMin  = (rideS / 60).toFixed(1);
    document.getElementById(`est-${i}`).innerHTML =
      `Riding time in gap: <strong>${rideMin} min</strong> at <strong>${speedKmh} km/h</strong> → missing distance: <strong>${distKm} km</strong>`;
  }

  // ── Repair ────────────────────────────────────────────────────────────────
  btnRepair.addEventListener('click', async () => {
    if (!currentFile || !analysisData) return;

    const params = analysisData.gaps.map((_, i) => ({
      stop_s:   parseFloat(document.querySelector(`.inp-stop[data-idx="${i}"]`).value || 0) * 60,
      ride_kmh: parseFloat(document.querySelector(`.inp-speed[data-idx="${i}"]`).value || 25),
    }));

    btnRepair.disabled = true;
    btnRepair.innerHTML = '<span class="spinner"></span>Uploading for repair…';
    resultSect.style.display = 'none';

    const fd = new FormData();
    fd.append('file', currentFile);
    fd.append('params', JSON.stringify(params));

    let jobId;
    try {
      const res = await fetch(`${API}/repair`, { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      jobId = data.job_id;
    } catch (err) {
      setStatus(`Repair failed: ${err.message}`, 'error');
      btnRepair.disabled = false;
      btnRepair.textContent = 'Repair FIT file';
      return;
    }

    btnRepair.innerHTML = '<span class="spinner"></span>Repairing… this may take up to 60 seconds';

    pollJob(jobId,
      (data) => {
        btnRepair.disabled = false;
        btnRepair.textContent = 'Repair FIT file';
        clearStatus();

        document.getElementById('r-orig').textContent  = data.original_dist_km + ' km';
        document.getElementById('r-added').textContent = '+' + data.added_dist_km + ' km';
        document.getElementById('r-total').textContent = data.new_dist_km + ' km';

        btnDownload.href = `${API}/download/${jobId}`;
        btnDownload.download = data.out_name;
        btnDownload.textContent = `⬇ Download ${data.out_name}`;

        resultSect.style.display = 'block';
        resultSect.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      },
      (err) => {
        btnRepair.disabled = false;
        btnRepair.textContent = 'Repair FIT file';
        setStatus(`Repair failed: ${err}`, 'error');
      }
    );
  });
</script>
</body>
</html>
